name: Deploy websocket server

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v2

      - name: Docker login
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./docker/Dockerfile.websocket
          push: true
          tags: hitendras510/todo-app-websocket:${{ github.sha }}

      - name: Deploy to EC2
        run: |
          mkdir -p ~/.ssh
          printf "%s" "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H 18.234.61.207 >> ~/.ssh/known_hosts

          IMAGE_TAG=${{ github.sha }}

          ssh ec2-user@18.234.61.207 << EOF
            docker stop websocket || true
            docker rm websocket || true
            docker pull hitendras510/todo-app-websocket:$IMAGE_TAG
            docker run -d -p 8081:8081 --name websocket --restart always hitendras510/todo-app-websocket:$IMAGE_TAG
          EOF